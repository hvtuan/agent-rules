name: QC Automation
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci   # requires a committed package-lock.json
      # Errors block; warnings (e.g. an intentional test.skip with a reason) inform only.
      - run: npx eslint .
      - run: npx tsc --noEmit
      - run: npx playwright install --with-deps
      - run: npx playwright test --shard=${{ matrix.shard }}/2
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

  smoke-perf:
    runs-on: ubuntu-latest
    continue-on-error: true   # perf thresholds WARN, do not block deploy
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      # k6 v0.57+ runs TypeScript natively; older k6 needs bundling (see performance.md).
      - run: k6 run perf/checkout.smoke.ts
